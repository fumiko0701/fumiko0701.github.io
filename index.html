<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Próximo Culto</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --background-color-dark: #061207;
            --card-background-color-dark: #29524a;
            --text-color-light: #ffffff;
            --description-color: gray;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--background-color-dark);
            font-family: 'Roboto', sans-serif;
        }

        .container {
            display: flex;
            align-items: center;
            width: 100%;
            justify-content: space-around;
        }

        .card {
            display: flex;
            background-color: var(--card-background-color-dark);
            padding: 0;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            width: 90%;
            max-width: 1200px;
            height: auto;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }

        .card img {
            width: 45%;
            height: auto;
            border-radius: 15px 0 0 15px;
            object-fit: cover;
            object-position: center;
            aspect-ratio: 16 / 9;
            margin-left: -20px;
            margin-right: 30px;
            position: relative;
            z-index: 1;
            margin-top: -20px;
            margin-bottom: -20px;
            animation: slideIn 0.8s forwards;
        }

        @keyframes slideIn {
            from {
                transform: translateX(-100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .card-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #nomeCulto {
            font-size: 3.5vw; /* Aumentar tamanho da fonte do nome do culto */
            font-weight: 700;
            color: var(--text-color-light);
            white-space: nowrap;
            overflow: hidden;
        }

        #descricaoCulto {
            font-size: 2.5vw; /* Aumentar tamanho da fonte da descrição */
            color: var(--description-color);
            margin-top: 5px;
        }

        .fields {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .fields p {
            font-size: 3vw; /* Aumentar tamanho da fonte dos campos no mobile */
            margin: 5px 0;
            color: var(--text-color-light);
        }

        .emoji {
            font-size: 2vw;
        }

        @media (min-width: 768px) {
            #nomeCulto {
                font-size: 24px;
            }

            #descricaoCulto {
                font-size: 16px;
            }

            .fields p {
                font-size: 18px;
            }

            .emoji {
                font-size: 24px;
            }
        }

        /* Estilos para dispositivos móveis */
        @media (max-width: 767px) {
            body {
                flex-direction: column;
                justify-content: flex-start; /* Mover o card para o topo da página */
                align-items: flex-start; /* Garantir alinhamento adequado */
            }

            .container {
                justify-content: flex-start; /* Mover o container para o topo */
                align-items: flex-start;
                width: 100%;
            }

            .card {
                flex-direction: column;
                width: 100%;
                max-width: none;
                margin-top: 0; /* remove espaço entre o card e o topo */
                position: relative; /* Manter posição relativa */
                background-color: #29524a; /* Alterar cor do card */
            }

            .card img {
                width: 100%;
                border-radius: 15px 15px 0 0;
                margin: 0;
            }

            /* Centralizar os dois primeiros campos */
            .fields {
                align-items: center;
                text-align: center;
            }

            #nomeCulto {
                font-size: 6vw; /* Nome do culto maior que os demais campos */
            }

            .fields p {
                font-size: 4vw; /* Aumentar tamanho do texto dos campos */
                color: var(--text-color-light); /* Cor branca para o texto */
            }

            #descricaoCulto {
                color: var(--description-color); /* Manter cor cinza na descrição */
            }

            /* A partir do terceiro campo (pc em diante), alinhar à esquerda */
            .fields p:nth-child(n+3) {
                align-self: flex-start;
                text-align: left;
                padding-left: 20px; /* Adicionar espaçamento para o alinhamento à esquerda */
            }
        }
    </style>
</head>
<body>
    <div class="container"> <!-- Container para o card -->
        <div class="card">
            <img src="ceia.jpg" alt="Próximo Culto">
            <div class="card-content">
                <div class="fields">
                    <p id="nomeCulto"><strong></strong></p>
                    <p id="descricaoCulto"></p>
                    <p><span class="emoji">💻</span> - <span id="pc"></span></p>
                    <p><span class="emoji">🎥</span> - <span id="cam1"></span></p>
                    <p><span class="emoji">🎥</span> - <span id="cam2"></span></p>
                    <p><span class="emoji">🤳</span> - <span id="storys"></span></p>
                    <p><span class="emoji">🎤</span> - <span id="reporter"></span></p>
                    <p><span class="emoji">📷</span> - <span id="fotos"></span></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Definições iniciais (exemplo)
        document.getElementById('nomeCulto').textContent = 'Culto de Adoração';
        document.getElementById('descricaoCulto').textContent = 'Venha nos adorar juntos!';
        document.getElementById('pc').textContent = 'PC 1';
        document.getElementById('cam1').textContent = 'Câmera 1';
        document.getElementById('cam2').textContent = 'Câmera 2';
        document.getElementById('storys').textContent = 'Story 1';
        document.getElementById('reporter').textContent = 'Repórter';
        document.getElementById('fotos').textContent = 'Fotógrafo';
    </script>
</body>
</html>
