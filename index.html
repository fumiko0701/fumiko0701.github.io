<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Próximo Culto</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        .card {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #fff;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            max-width: 90%;
            width: 100%;
            box-sizing: border-box;
        }
        img {
            width: 100%;
            height: auto;
            max-width: 350px; /* Ajusta a largura máxima da imagem */
            border-radius: 10px;
        }
        #nomeCulto {
            font-size: 5vw;
            margin-top: 20px;
            text-align: center;
            width: 100%;
        }
        .fields {
            margin-top: 20px;
            width: 100%;
            max-width: 350px;
        }
        .fields p {
            font-size: 4vw;
            margin: 10px 0;
            text-align: left;
            padding-left: 20px;
        }
        .emoji {
            font-size: 5vw;
        }
        @media (min-width: 768px) {
            #nomeCulto {
                font-size: 24px;
            }
            .fields p {
                font-size: 18px;
            }
            .emoji {
                font-size: 24px;
            }
        }
        /* Estilos para os botões flutuantes */
        .floating-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background-color: #4CAF50;
            color: white;
            border-radius: 50%;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            font-size: 24px;
        }
        .floating-btn:hover {
            background-color: #45a049;
        }
        .floating-btn-eye {
            bottom: 100px;
            background-color: #008CBA;
        }
        .floating-btn-eye:hover {
            background-color: #007bb5;
        }
    </style>
</head>
<body>
    <div class="card" id="contentToCopy">
        <img src="proxculto.jpg" alt="Próximo Culto">
        <p id="nomeCulto"></p>
        <div class="fields">
            <p><span class="emoji">💻</span> - <span id="pc"></span></p>
            <p><span class="emoji">🎥</span> - <span id="cam1"></span></p>
            <p><span class="emoji">🎥</span> - <span id="cam2"></span></p>
            <p><span class="emoji">🤳</span> - <span id="storys"></span></p>
            <p><span class="emoji">🎤</span> - <span id="reporter"></span></p>
            <p><span class="emoji">📷</span> - <span id="fotos"></span></p>
        </div>
    </div>

    <!-- Botões flutuantes -->
    <button class="floating-btn floating-btn-eye" onclick="window.location.href='escala-online.html'">👁</button> <!-- Botão de olhinho -->
    <button class="floating-btn" onclick="copyText()">&#10148;</button> <!-- Botão de enviar -->









    <script>
        // Definindo variáveis com o conteúdo de cada campo
        const nomeCulto = "CULTO DE DOUTRINA - 19h";
        const pc = "WILIAN";
        const cam1 = "LUCAS";
        const cam2 = "JOAO";
        const storys = "RAYANNE";
        const reporter = "";
        const fotos = "ESTER";











        // Atribuindo os valores ao HTML
        document.getElementById('nomeCulto').textContent = nomeCulto;
        document.getElementById('pc').textContent = pc;
        document.getElementById('cam1').textContent = cam1;
        document.getElementById('cam2').textContent = cam2;
        document.getElementById('storys').textContent = storys;
        document.getElementById('reporter').textContent = reporter;
        document.getElementById('fotos').textContent = fotos;

        // Função para copiar o texto formatado para a área de transferência
        function copyText() {
            const formattedText = `*${nomeCulto}*
_________________________________

💻 - ${pc}
🎥 - ${cam1}
🎥 - ${cam2}
🤳 - ${storys}
🎤 - ${reporter}
📷 - ${fotos}`;

            navigator.clipboard.writeText(formattedText).then(function() {
                alert("Texto copiado para a área de transferência!");
            }, function(err) {
                alert("Erro ao copiar o texto: " + err);
            });
        }
    </script>
</body>
</html>
