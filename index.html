<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Próximo Culto</title>
    <link rel="stylesheet" href="estilo.css">
    <script>
        // Definindo variáveis com o conteúdo de cada campo
        const nomeCulto = "SANTA CEIA - 19h";
        const descricaoCulto = "Sexta-feira | 04/10";
        const pc = "ISAAC";
        const cam1 = "SAMUEL S";
        const cam2 = "SAMUEL F";
        const storys = "DAIRANE";
        const reporter = "";
        const fotos = "INGRID";

        // Atribuindo os valores ao HTML
        function populateFields() {
            document.getElementById('nomeCulto').innerHTML = `<strong>${nomeCulto}</strong>`;
            document.getElementById('descricaoCulto').textContent = descricaoCulto;
            document.getElementById('pc').textContent = pc;
            document.getElementById('cam1').textContent = cam1;
            document.getElementById('cam2').textContent = cam2;
            document.getElementById('storys').textContent = storys;
            document.getElementById('reporter').textContent = reporter;
            document.getElementById('fotos').textContent = fotos;
        }

        // Função para copiar o texto formatado para a área de transferência
        function copyText() {
            const formattedText = `*${nomeCulto}*
________________________________

💻 - ${pc}
🎥 - ${cam1}
🎥 - ${cam2}
🤳 - ${storys}
🎤 - ${reporter}
📷 - ${fotos}`;

            navigator.clipboard.writeText(formattedText).then(function() {
                alert("Texto copiado para a área de transferência!");
            }, function(err) {
                alert("Erro ao copiar o texto: " + err);
            });
        }

        // Chamando a função para preencher os campos ao carregar a página
        window.onload = populateFields;
    </script>
    <style>
        /* Estilo para a imagem name.png como footer */
        .footer-image {
            display: block; 
            margin: 0 auto; 
            max-width: 90%; /* Diminuindo um pouco o tamanho da imagem */
            height: auto; 
            position: absolute; /* Muda para posição absoluta */
            left: 50%; /* Centraliza horizontalmente */
            transform: translateX(-50%); /* Ajusta a posição horizontal */
            z-index: 1000; /* Garante que a imagem fique acima de outros elementos */
            bottom: 40px; /* Distância da borda inferior - Aumentada para 40px */
        }

        /* Estilo específico para desktop */
        @media (min-width: 768px) {
            .footer-image {
                bottom: 40px; /* Aumenta a distância da imagem para a borda inferior */
                max-width: 20%;
            }
            .logo-desktop {
                max-width: 12%; /* Tamanho da logo no desktop */
                margin-right: 30px; /* Espaço à direita da logo */
                margin-top: 10px; /* Ajuste a distância do topo da logo */
            }
            .logo-mobile {
                display: none; /* Esconde a logo mobile no desktop */
            }
        }

        /* Estilo específico para mobile */
        @media (max-width: 767px) {
            .footer-image {
                bottom: 5px; /* Ajusta a distância da borda inferior - Aumentada para 60px */
                max-width: 70%; /* Diminuindo o tamanho da imagem no mobile */
                position: absolute; /* Mantém a posição absoluta para centralização */
                left: 50%; /* Centraliza horizontalmente */
                transform: translateX(-50%); /* Ajusta a posição horizontal */
            }
            .logo-desktop {
                display: none; /* Esconde a logo desktop no mobile */
            }
            .logo-mobile {
                max-width: 10%; /* Reduzindo o tamanho da logo no mobile */
                display: block; /* Mostra a logo mobile */
                margin: 2px; /* Adiciona espaço entre a logo mobile e o card */
                position: absolute; /* Torna a logo flutuante */
                top: 15px; /* Ajuste a distância do topo da logo mobile */
                left: 50%; /* Centraliza horizontalmente */
                transform: translateX(-50%); /* Ajusta a posição horizontal */
                z-index: 10; /* Assegura que a logo apareça acima do card */
            }
        }

        /* Alinhamento do card e logo */
        .card-container {
            display: flex;
            justify-content: center; /* Centraliza horizontalmente o card */
            align-items: center; /* Alinha logo e card ao centro */
            width: 100%;
            padding: 60px 0; /* Ajuste o padding superior para centralizar verticalmente */
            position: relative; /* Permite posicionar elementos filhos */
        }

        .card {
            display: flex;
            background-color: var(--card-background-color-dark);
            padding: 0;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            width: 90%;
            max-width: 1200px;
            height: auto;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
            margin-top: 40px; /* Espaço entre a logo e o card */
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card-container">
            <img src="logo.png" alt="Logo" class="logo-desktop"> <!-- Logo desktop -->
            <div class="card">
                <img src="ceia.jpg" alt="Imagem do Culto">
                <div class="card-content">
                    <div class="fields">
                        <h1 id="nomeCulto">Nome do Culto</h1>
                        <p id="descricaoCulto">Descrição do culto</p>
                        <p><span class="emoji">💻</span> - <span id="pc"></span></p>
                        <p><span class="emoji">🎥</span> - <span id="cam1"></span></p>
                        <p><span class="emoji">🎥</span> - <span id="cam2"></span></p>
                        <p><span class="emoji">🤳</span> - <span id="storys"></span></p>
                        <p><span class="emoji">🎤</span> - <span id="reporter"></span></p>
                        <p><span class="emoji">📷</span> - <span id="fotos"></span></p>
                    </div>
                </div>

                <!-- Botões flutuantes -->
                <div class="floating-buttons">
                    <button class="button view" onclick="window.open('escala-online.html', '_self')"></button>
                    <button class="button copy" onclick="copyText()"></button>
                </div>
            </div>
        </div>
        <img src="logo.png" alt="Logo" class="logo-mobile"> <!-- Logo no mobile -->
    </div>

    <!-- Imagem name.png como footer -->
    <img src="name.png" alt="Nome" class="footer-image">

</body>
</html>
